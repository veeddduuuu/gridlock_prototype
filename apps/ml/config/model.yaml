seeds: [42, 123]

blend_grid: [0.40, 0.45, 0.50, 0.55, 0.60, 0.65, 0.70]

optuna:
  n_trials: 80
  timeout_seconds: 600

cv:
  n_splits: 5

lgb_space:
  num_leaves: [7, 127]
  min_child_samples: [5, 80]
  learning_rate: [0.005, 0.1]
  feature_fraction: [0.5, 1.0]
  bagging_fraction: [0.5, 1.0]
  bagging_freq: 5
  n_estimators: 3000
  early_stopping_rounds: 80

cat_space:
  depth: [2, 8]
  learning_rate: [0.005, 0.1]
  l2_leaf_reg: [1.0, 30.0]
  min_data_in_leaf: [3, 50]
  random_strength: [0.05, 2.0]
  bagging_temperature: [0.0, 1.5]
  iterations: 3000
  early_stopping_rounds: 80

pruning:
  importance_threshold: 0.005
  rmse_tolerance: 0.01
