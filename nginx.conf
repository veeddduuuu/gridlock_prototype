events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Define upstreams for the services defined in docker-compose.yml
    upstream frontend {
        server frontend:5173;
    }

    upstream backend {
        server backend:4000;
    }

    upstream ml {
        server ml:8000;
    }

    upstream mlflow {
        server mlflow:5001;
    }

    server {
        listen 80;
        server_name alphaq.duckdns.org;

        # Frontend reverse proxy (Vite dev server)
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Backend API and WebSocket proxy
        location /api/ {
            # Trailing slash is omitted from proxy_pass to forward the /api prefix
            proxy_pass http://backend;
            
            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Standard headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_cache_bypass $http_upgrade;
        }

        # ML API proxy
        location /ml/ {
            proxy_pass http://ml/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # MLFlow UI proxy
        location /mlflow/ {
            proxy_pass http://mlflow/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
