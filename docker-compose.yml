services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./apps/backend
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379
      - ML_SERVICE_URL=http://ml:8000
    depends_on:
      - redis
    working_dir: /app/apps/backend
    volumes:
      - .:/app

  frontend:
    build:
      context: ./apps/frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:4000
    depends_on:
      - backend
    working_dir: /app/apps/frontend
    volumes:
      - .:/app

  ml:
    build:
      context: ./apps/ml
    ports:
      - "8000:8000"
    volumes:
      - ./apps/ml:/app

volumes:
  redis_data:
