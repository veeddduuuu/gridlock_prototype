services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./apps/backend
    ports:
      - "4000:4000"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      - PORT=4000
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=redis://redis:6379
      - ML_SERVICE_URL=http://ml:8000
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL_ID=${GROQ_MODEL_ID}
      - MAPMYINDIA_API=${MAPMYINDIA_API}
      - MAPPLS_API_KEY=${MAPPLS_API_KEY}
      - MAPPLS_CLIENT_ID=${MAPPLS_CLIENT_ID}
      - MAPPLS_CLIENT_SECRET=${MAPPLS_CLIENT_SECRET}
    depends_on:
      - redis
    working_dir: /app/apps/backend
    volumes:
      - .:/app

  frontend:
    build:
      context: ./apps/frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:4000
      - VITE_MAPPLS_API_KEY=${VITE_MAPPLS_API_KEY}
    depends_on:
      - backend
    working_dir: /app/apps/frontend
    volumes:
      - .:/app

  ml:
    build:
      context: ./apps/ml
    ports:
      - "8000:8000"
    volumes:
      - ./apps/ml:/app

  mlflow:
    image: python:3.11-slim
    ports:
      - "5001:5001"
    working_dir: /app
    volumes:
      - ./apps/ml:/app
    command: >
      sh -c "pip install --no-cache-dir mlflow>=2.12 &&
      mlflow ui
      --backend-store-uri sqlite:///mlflow.db
      --default-artifact-root ./mlartifacts
      --host 0.0.0.0
      --port 5001"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
      - ml
      - mlflow

volumes:
  redis_data:
