name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Frontend ────────────────────────────────────────────────────────────────
  frontend-ci:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/frontend

    # Only run when frontend files change
    if: |
      github.event_name == 'push' ||
      contains(toJson(github.event.pull_request.changed_files), 'apps/frontend')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  # ─── Backend ─────────────────────────────────────────────────────────────────
  backend-ci:
    name: Backend (lint + build)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/backend

    # Only run when backend files change
    if: |
      github.event_name == 'push' ||
      contains(toJson(github.event.pull_request.changed_files), 'apps/backend')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  # ─── ML ──────────────────────────────────────────────────────────────────────
  ml-ci:
    name: ML (install)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/ml

    # Only run when ml files change
    if: |
      github.event_name == 'push' ||
      contains(toJson(github.event.pull_request.changed_files), 'apps/ml')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: apps/ml/requirements.txt

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libgomp1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
