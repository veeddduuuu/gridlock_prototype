name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── CI: Frontend ────────────────────────────────────────────────────────────
  frontend-ci:
    name: Frontend CI (build)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  # ─── CI: Backend ─────────────────────────────────────────────────────────────
  backend-ci:
    name: Backend CI (build)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  # ─── CI: ML ──────────────────────────────────────────────────────────────────
  ml-ci:
    name: ML CI (install + smoke test)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/ml

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: apps/ml/requirements.txt

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libgomp1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --retries 5 --timeout 60 -r requirements.txt

      - name: Smoke test (imports + schemas)
        run: |
          python -c "
          from src.predict import Predictor, find_latest_artifacts
          from src.queue_model import compute_queue_metrics, recommend_deployment, recommend_gating, compute_tandem_queue_metrics
          from src.counterfactual import run_counterfactual_analysis
          from src.active import update_active_prediction
          from src.api.schemas import PredictRequest, PredictResponse, RepredictRequest, QueueAnalysisResponse
          from src.api.main import app
          from src.features import Encoders
          from src.data import load_config
          from experiments.feature_registry import FEATURE_SETS
          from experiments.model_registry import MODEL_REGISTRY, create_model
          print(f'Models: {list(MODEL_REGISTRY.keys())}')
          print(f'Feature sets: {list(FEATURE_SETS.keys())}')
          assert len(MODEL_REGISTRY) >= 3, 'Expected at least 3 models'
          assert len(FEATURE_SETS) >= 6, 'Expected at least 6 feature sets'
          api_routes = [r.path for r in app.routes if getattr(r, 'path', '').startswith('/api')]
          for route in ('/api/ml/predict', '/api/ml/queue-analysis', '/api/ml/repredict'):
              assert route in api_routes, f'Missing API route: {route}'
          print(f'API routes wired: {len(api_routes)}')
          print('All imports OK')
          "

      - name: Validate ML config files
        run: |
          python -c "
          import yaml
          with open('config/schema.yaml') as f:
              cfg = yaml.safe_load(f)
              assert 'columns' in cfg, 'schema.yaml missing columns'
              assert 'duration' in cfg, 'schema.yaml missing duration'
          with open('config/experiment.yaml') as f:
              cfg = yaml.safe_load(f)
              assert 'mlflow' in cfg, 'experiment.yaml missing mlflow'
              assert 'tournament' in cfg, 'experiment.yaml missing tournament'
          print('Config validation OK')
          "

  # ─── CD: EC2 Deployment ──────────────────────────────────────────────────────
  deploy-to-ec2:
    name: Deploy to EC2 Instance
    needs: [frontend-ci, backend-ci, ml-ci]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Navigate to the project directory on your EC2 instance
            # Replace this path with the actual path where your project is cloned
            cd ~/gridlock_prototype

            # Pull the latest changes from the main branch
            git fetch origin
            git reset --hard origin/main

            # Rebuild and restart the Docker containers
            docker compose down
            add a npm install
            docker compose up -d --build
